  <rect x="30" y="468" width="14" height="14" rx="2.5" fill="#2563EB"/>
  <text x="50" y="480" class="legend-text">Successful employee</text>
  <rect x="200" y="468" width="14" height="14" rx="2.5" fill="#D1D5DB" stroke="#B0B5BD" stroke-width="0.5"/>
  <text x="220" y="480" class="legend-text">Not successful</text>

  <!-- Caption -->
  <text x="30" y="505" class="caption">Each icon represents 1% of applicants. Blue icons show the percentage who become successful employees.</text>
  <text x="30" y="517" class="caption">Binomial Effect Size Display (BESD) — Rosenthal &amp; Rubin (1982).</text>
</svg>
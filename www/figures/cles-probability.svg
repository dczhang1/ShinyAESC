<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" width="700" height="520" font-family="'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowLg" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="grayGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9CA3AF"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect x="20" y="15" width="660" height="490" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="20" y="15" width="660" height="490" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#shadowLg)"/>

  <!-- Subtle top accent bar -->
  <rect x="20" y="15" width="660" height="4" rx="2" fill="#2563EB" clip-path="url(#roundClip)"/>

  <!-- Title -->
  <text x="350" y="52" text-anchor="middle" font-size="20" font-weight="700" fill="#111827" letter-spacing="-0.3">Probability of Superiority (d = 0.50)</text>
  <text x="350" y="74" text-anchor="middle" font-size="13" fill="#6B7280" font-weight="400">Random pairwise comparison: trained vs. untrained employee</text>

  <!-- Divider -->
  <line x1="60" y1="90" x2="640" y2="90" stroke="#F3F4F6" stroke-width="1.5"/>

  <!-- === SECTION 1: Person Icons + 64% === -->

  <!-- Trained Person (Blue) -->
  <g transform="translate(165, 110)">
    <!-- Head -->
    <circle cx="0" cy="18" r="16" fill="url(#blueGrad)"/>
    <!-- Body -->
    <path d="M-22,58 C-22,42 -12,36 0,36 C12,36 22,42 22,58" fill="url(#blueGrad)"/>
    <!-- Label -->
    <text x="0" y="80" text-anchor="middle" font-size="12.5" font-weight="600" fill="#2563EB">Trained</text>
  </g>

  <!-- Untrained Person (Gray) -->
  <g transform="translate(535, 110)">
    <!-- Head -->
    <circle cx="0" cy="18" r="16" fill="url(#grayGrad)"/>
    <!-- Body -->
    <path d="M-22,58 C-22,42 -12,36 0,36 C12,36 22,42 22,58" fill="url(#grayGrad)"/>
    <!-- Label -->
    <text x="0" y="80" text-anchor="middle" font-size="12.5" font-weight="600" fill="#6B7280">Untrained</text>
  </g>

  <!-- Arrow from trained to untrained -->
  <line x1="280" y1="138" x2="420" y2="138" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="420,138 413,134 413,142" fill="#D1D5DB"/>

  <!-- 64% Badge -->
  <g transform="translate(350, 132)">
    <rect x="-52" y="-24" width="104" height="44" rx="22" fill="#2563EB" filter="url(#shadow)"/>
    <text x="0" y="4" text-anchor="middle" font-size="26" font-weight="800" fill="#FFFFFF" letter-spacing="-0.5">64%</text>
  </g>
  <text x="350" y="176" text-anchor="middle" font-size="10.5" fill="#9CA3AF" font-weight="500" letter-spacing="0.5">PROBABILITY TRAINED WINS</text>

  <!-- Divider -->
  <line x1="60" y1="198" x2="640" y2="198" stroke="#F3F4F6" stroke-width="1.5"/>

  <!-- === SECTION 2: 10 Pairwise Comparisons Grid === -->

  <text x="350" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#374151" letter-spacing="0.3">10 RANDOM PAIRWISE COMPARISONS</text>

  <!-- Row of 10 comparison boxes -->
  <!-- Each box: 50x50, gap 8, total = 10*50 + 9*8 = 572, start x = (700-572)/2 = 64 -->

  <!-- Comparison 1: Trained wins (blue) -->
  <g transform="translate(74, 240)" filter="url(#shadow)">
    <rect x="0" y="0" width="50" height="50" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
    <text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#2563EB">T</text>
    <line x1="10" y1="28" x2="40" y2="28" stroke="#2563EB" stroke-width="0.8"/>
    <text x="25" y="42" text-anchor="middle" font-size="10" font-weight="600" fill="#9CA3AF">U</text>
    <circle cx="42" cy="8" r="6" fill="#2563EB"/>
    <text x="42" y="11.5" text-anchor="middle" font-size="7" font-weight="700" fill="#FFF">✓</text>
  </g>

  <!-- Comparison 2: Untrained wins (gray) -->
  <g transform="translate(132, 240)" filter="url(#shadow)">
    <rect x="0" y="0" width="50" height="50" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#9CA3AF">T</text>
    <line x1="10" y1="28" x2="40" y2="28" stroke="#D1D5DB" stroke-width="0.8"/>
    <text x="25" y="42" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">U</text>
    <circle cx="42" cy="8" r="6" fill="#6B7280"/>
    <text x="42" y="11.5" text-anchor="middle" font-size="7" font-weight="700" fill="#FFF">✓</text>
  </g>

  <!-- Comparison 3: Trained wins (blue) -->
  <g transform="translate(190, 240)" filter="url(#shadow)">
    <rect x="0" y="0" width="50" height="50" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
    <text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#2563EB">T</text>
    <line x1="10" y1="28" x2="40" y2="28" stroke="#2563EB" stroke-width="0.8"/>
    <text x="25" y="42" text-anchor="middle" font-size="10" font-weight="600" fill="#9CA3AF">U</text>
    <circle cx="42" cy="8" r="6" fill="#2563EB"/>
    <text x="42" y="11.5" text-anchor="middle" font-size="7" font-weight="700" fill="#FFF">✓</text>
  </g>

  <!-- Comparison 4: Trained wins (blue) -->
  <g transform="translate(248, 240)" filter="url(#shadow)">
    <rect x="0" y="0" width="50" height="50" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
    <text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#2563EB">T</text>
    <line x1="10" y1="28" x2="40" y2="28" stroke="#2563EB" stroke-width="0.8"/>
    <text x="25" y="42" text-anchor="middle" font-size="10" font-weight="600" fill="#9CA3AF">U</text>
    <circle cx="42" cy="8" r="6" fill="#2563EB"/>
    <text x="42" y="11.5" text-anchor="middle" font-size="7" font-weight="700" fill="#FFF">✓</text>
  </g>

  <!-- Comparison 5: Untrained wins (gray) -->
  <g transform="translate(306, 240)" filter="url(#shadow)">
    <rect x="0" y="0" width="50" height="50" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#9CA3AF">T</text>
    <line x1="10" y1="28" x2="40" y2="28" stroke="#D1D5DB" stroke-width="0.8"/>
    <text x="25" y="42" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">U</text>
    <circle cx="42" cy="8" r="6" fill="#6B7280"/>
    <text x="42" y="11.5" text-anchor="middle" font-size="7" font-weight="700" fill="#FFF">✓</text>
  </g>

  <!-- Comparison 6: Trained wins (blue) -->
  <g transform="translate(364, 240)" filter="url(#shadow)">
    <rect x="0" y="0" width="50" height="50" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
    <text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#2563EB">T</text>
    <line x1="10" y1="28" x2="40" y2="28" stroke="#2563EB" stroke-width="0.8"/>
    <text x="25" y="42" text-anchor="middle" font-size="10" font-weight="600" fill="#9CA3AF">U</text>
    <circle cx="42" cy="8" r="6" fill="#2563EB"/>
    <text x="42" y="11.5" text-anchor="middle" font-size="7" font-weight="700" fill="#FFF">✓</text>
  </g>

  <!-- Comparison 7: Untrained wins (gray) -->
  <g transform="translate(422, 240)" filter="url(#shadow)">
    <rect x="0" y="0" width="50" height="50" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#9CA3AF">T</text>
    <line x1="10" y1="28" x2="40" y2="28" stroke="#D1D5DB" stroke-width="0.8"/>
    <text x="25" y="42" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">U</text>
    <circle cx="42" cy="8" r="6" fill="#6B7280"/>
    <text x="42" y="11.5" text-anchor="middle" font-size="7" font-weight="700" fill="#FFF">✓</text>
  </g>

  <!-- Comparison 8: Trained wins (blue) -->
  <g transform="translate(480, 240)" filter="url(#shadow)">
    <rect x="0" y="0" width="50" height="50" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
    <text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#2563EB">T</text>
    <line x1="10" y1="28" x2="40" y2="28" stroke="#2563EB" stroke-width="0.8"/>
    <text x="25" y="42" text-anchor="middle" font-size="10" font-weight="600" fill="#9CA3AF">U</text>
    <circle cx="42" cy="8" r="6" fill="#2563EB"/>
    <text x="42" y="11.5" text-anchor="middle" font-size="7" font-weight="700" fill="#FFF">✓</text>
  </g>

  <!-- Comparison 9: Trained wins (blue) -->
  <g transform="translate(538, 240)" filter="url(#shadow)">
    <rect x="0" y="0" width="50" height="50" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
    <text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#2563EB">T</text>
    <line x1="10" y1="28" x2="40" y2="28" stroke="#2563EB" stroke-width="0.8"/>
    <text x="25" y="42" text-anchor="middle" font-size="10" font-weight="600" fill="#9CA3AF">U</text>
    <circle cx="42" cy="8" r="6" fill="#2563EB"/>
    <text x="42" y="11.5" text-anchor="middle" font-size="7" font-weight="700" fill="#FFF">✓</text>
  </g>

  <!-- Comparison 10: Untrained wins (gray) -->
  <g transform="translate(596, 240)" filter="url(#shadow)">
    <rect x="0" y="0" width="50" height="50" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="25" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#9CA3AF">T</text>
    <line x1="10" y1="28" x2="40" y2="28" stroke="#D1D5DB" stroke-width="0.8"/>
    <text x="25" y="42" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">U</text>
    <circle cx="42" cy="8" r="6" fill="#6B7280"/>
    <text x="42" y="11.5" text-anchor="middle" font-size="7" font-weight="700" fill="#FFF">✓</text>
  </g>

  <!-- Tally bar below grid -->
  <g transform="translate(0, 306)">
    <!-- Blue tally -->
    <rect x="170" y="0" width="180" height="26" rx="4" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <circle cx="190" cy="13" r="7" fill="#2563EB"/>
    <text x="190" y="16.5" text-anchor="middle" font-size="8" font-weight="700" fill="#FFF">T</text>
    <text x="265" y="17" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2563EB">6 trained wins</text>

    <!-- Gray tally -->
    <rect x="360" y="0" width="180" height="26" rx="4" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
    <circle cx="380" cy="13" r="7" fill="#6B7280"/>
    <text x="380" y="16.5" text-anchor="middle" font-size="8" font-weight="700" fill="#FFF">U</text>
    <text x="457" y="17" text-anchor="middle" font-size="11.5" font-weight="700" fill="#6B7280">4 untrained wins</text>
  </g>

  <!-- Divider -->
  <line x1="60" y1="352" x2="640" y2="352" stroke="#F3F4F6" stroke-width="1.5"/>

  <!-- === SECTION 3: Caption === -->
  <text x="350" y="376" text-anchor="middle" font-size="12" fill="#374151" font-weight="500" font-style="italic">Out of every 10 random comparisons, the trained employee outperforms</text>
  <text x="350" y="394" text-anchor="middle" font-size="12" fill="#374151" font-weight="500" font-style="italic">the untrained employee about 6 times.</text>

  <!-- Divider -->
  <line x1="60" y1="414" x2="640" y2="414" stroke="#F3F4F6" stroke-width="1"/>

  <!-- === SECTION 4: Formula === -->
  <g transform="translate(0, 430)">
    <rect x="150" y="0" width="400" height="34" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
    <text x="350" y="22" text-anchor="middle" font-size="13" fill="#059669" font-weight="600" font-style="italic">CLES = Φ(d / √2) where Φ is the standard normal CDF</text>
  </g>

  <!-- Footer note -->
  <text x="350" y="490" text-anchor="middle" font-size="9.5" fill="#9CA3AF" font-weight="400">Common Language Effect Size  ·  d = 0.50 corresponds to CLES ≈ 0.638 or 64%</text>
</svg>